<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Checkout - GRANITINA</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container py-5">

    <div class="mb-4">
        <h1 class="fw-bold">Checkout</h1>
        <p class="text-muted">Preencha seus dados para finalizar o pedido.</p>
    </div>

    <div class="card shadow-sm">
        <div class="card-body">

            <form action="/checkout/finalizar" method="post">

                <div class="mb-3">
                    <label class="form-label">Nome</label>
                    <input type="text" name="nomeCliente" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Telefone</label>
                    <input type="text" name="telefoneCliente" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Cidade</label>
                    <input type="text" name="cidade" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Endereço</label>
                    <input type="text" name="endereco" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Observação</label>
                    <textarea name="observacao" class="form-control" rows="3"></textarea>
                </div>

                <button type="submit" class="btn btn-success">
                    Confirmar Pedido
                </button>

            </form>

        </div>
    </div>

</div>

</body>
</html>
