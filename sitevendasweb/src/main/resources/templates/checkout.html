<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
<meta charset="UTF-8">
<title>Checkout - GRANITINA</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<!-- HEADER -->

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">

        <a class="navbar-brand fw-bold" href="/">
            GRANITINA
        </a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="menu">
            <ul class="navbar-nav ms-auto">

                <li class="nav-item">
                    <a class="nav-link" href="/">Home</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="/catalogo">Catálogo</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="/carrinho">Carrinho</a>
                </li>

            </ul>
        </div>

    </div>
</nav>

<!-- TÍTULO -->

<section class="py-5 bg-light">
    <div class="container text-center">
        <h1 class="fw-bold text-primary">Finalizar Pedido</h1>
        <p class="text-muted mb-0">
            Preencha seus dados para concluir o pedido.
        </p>
    </div>
</section>

<!-- FORMULÁRIO -->

<section class="py-5">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-8">

                <div class="card shadow-sm border-0">
                    <div class="card-body p-4">

                        <form action="/checkout/finalizar" method="post">

                            <div class="mb-3">
                                <label class="form-label">Nome</label>
                                <input type="text" name="nomeCliente" class="form-control" required>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Telefone</label>
                                <input type="text" name="telefoneCliente" class="form-control" required>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Cidade</label>
                                <input type="text" name="cidade" class="form-control" required>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Endereço</label>
                                <input type="text" name="endereco" class="form-control" required>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Observação</label>
                                <textarea name="observacao" class="form-control" rows="4"></textarea>
                            </div>

                            <div class="alert alert-warning mt-4">
                                <strong>Pagamento:</strong> o pagamento é combinado manualmente após o pedido.
                                Aceitamos PIX, dinheiro na entrega e cartão na entrega.
                            </div>

                            <div class="d-grid mt-4">
                                <button type="submit" class="btn btn-success btn-lg">
                                    Confirmar Pedido
                                </button>
                            </div>

                        </form>

                    </div>
                </div>

            </div>
        </div>
    </div>
</section>

<!-- FOOTER -->

<footer class="py-4 border-top bg-light">
    <div class="container text-center">

        <h5 class="fw-bold text-primary mb-1">
            GRANITINA
        </h5>

        <p class="text-muted mb-2">
            Dolomita para Grafiato
        </p>

        <a href="https://wa.me/55SEUNUMEROAQUI"
           target="_blank"
           class="text-decoration-none">
           Atendimento via WhatsApp
        </a>

    </div>
</footer>

<!-- BOTÃO WHATSAPP -->

<a href="https://wa.me/55SEUNUMEROAQUI"
   target="_blank"
   class="btn btn-success rounded-circle shadow"
   style="position:fixed; bottom:20px; right:20px; width:60px; height:60px; display:flex; align-items:center; justify-content:center; font-size:22px; z-index:999;">
   W
</a>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
