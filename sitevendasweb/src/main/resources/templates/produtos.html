<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Produtos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container py-5">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="mb-0">Lista de Produtos</h1>
        <a href="/admin/produtos/novo" class="btn btn-primary">Novo Produto</a>
    </div>

    <div class="card shadow-sm">
        <div class="card-body">

            <table class="table table-striped table-hover align-middle mb-0">
                <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>Nome</th>
                        <th>Descrição</th>
                        <th>Preço</th>
                        <th>Estoque</th>
                        <th>Ativo</th>
                        <th>Ações</th>
                    </tr>
                </thead>

                <tbody>
                    <tr th:each="produto : ${produtos}">
                        <td th:text="${produto.id}"></td>
                        <td th:text="${produto.nome}"></td>
                        <td th:text="${produto.descricao}"></td>
                        <td th:text="${produto.preco}"></td>
                        <td th:text="${produto.estoque}"></td>
                        <td>
                            <span th:text="${produto.ativo} ? 'Sim' : 'Não'"
                                  th:classappend="${produto.ativo} ? 'text-success fw-bold' : 'text-danger fw-bold'">
                            </span>
                        </td>
                        <td>
                            <a th:href="@{'/admin/produtos/editar/' + ${produto.id}}"
                               class="btn btn-sm btn-warning me-2">
                                Editar
                            </a>

                            <form th:action="@{'/admin/produtos/excluir/' + ${produto.id}}"
                                  method="post"
                                  style="display:inline;">
                                <button type="submit"
                                        class="btn btn-sm btn-danger"
                                        onclick="return confirm('Tem certeza que deseja excluir este produto?')">
                                    Excluir
                                </button>
                            </form>
                        </td>
                    </tr>
                </tbody>
            </table>

        </div>
    </div>

</div>

</body>
</html>
