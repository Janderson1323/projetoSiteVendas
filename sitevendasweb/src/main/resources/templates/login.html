<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Login Admin</title>

<style>

body{
    font-family: Arial;
    background:#f4f4f4;
}

.container{
    width:300px;
    margin:120px auto;
    padding:30px;
    background:white;
    border-radius:8px;
    box-shadow:0px 0px 10px rgba(0,0,0,0.2);
}

input{
    width:100%;
    padding:10px;
    margin-top:10px;
}

button{
    width:100%;
    padding:10px;
    margin-top:15px;
    background:#2c7be5;
    color:white;
    border:none;
}

</style>

</head>

<body>

<div class="container">

<h2>Admin Login</h2>

<form th:action="@{/login}" method="post">

<input type="text" name="username" placeholder="Usuário">

<input type="password" name="password" placeholder="Senha">

<button type="submit">Entrar</button>

</form>

</div>

</body>
</html>
