<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Carrinho</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container py-5">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="fw-bold">Seu Carrinho</h1>
        <a href="/catalogo" class="btn btn-secondary">Continuar Comprando</a>
    </div>

    <div class="card shadow-sm">
        <div class="card-body">

            <table class="table table-striped align-middle">
                <thead class="table-dark">
                    <tr>
                        <th>Produto</th>
                        <th>Quantidade (kg)</th>
                        <th>Preço Unitário</th>
                        <th>Total Item</th>
                        <th>Ação</th>
                    </tr>
                </thead>

                <tbody>
                    <tr th:each="item, iterStat : ${itens}">
                        <td th:text="${item.produto.nome}"></td>
                        <td th:text="${item.quantidade}"></td>
                        <td th:text="${item.precoUnitario}"></td>
                        <td th:text="${item.quantidade * item.precoUnitario}"></td>
                        <td>
                            <a th:href="@{'/carrinho/remover/' + ${iterStat.index}}"
                               class="btn btn-danger btn-sm">
                                Remover
                            </a>
                        </td>
                    </tr>
                </tbody>
            </table>

            <div class="mt-4">
                <h3>
                    Total do Pedido:
                    <span class="text-success" th:text="${total}"></span>
                </h3>
            </div>

			<div class="mt-3 d-flex gap-2">
			    <form action="/carrinho/finalizar" method="post">
			        <button type="submit" class="btn btn-success">
			            Finalizar Pedido
			        </button>
			    </form>

			    <a th:href="@{'https://wa.me/11954307383?text=' + ${mensagemWhatsapp}}"
			       class="btn btn-primary"
			       target="_blank">
			        Pedir pelo WhatsApp
			    </a>
			</div>

        </div>
    </div>

</div>

</body>
</html>
