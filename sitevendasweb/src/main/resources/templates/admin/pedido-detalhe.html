<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Detalhe do Pedido</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container py-5">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="fw-bold">Detalhe do Pedido</h1>

        <div class="d-flex gap-2">
            <a href="/admin/pedidos" class="btn btn-secondary">Voltar</a>

            <a th:href="@{'https://wa.me/55' + ${pedido.telefoneCliente} + '?text=Olá,%20' + ${pedido.nomeCliente} + ',%20aqui%20é%20da%20GRANITINA.%20Estou%20entrando%20em%20contato%20sobre%20o%20seu%20pedido%20número%20' + ${pedido.id}}"
               class="btn btn-success"
               target="_blank">
                Falar no WhatsApp
            </a>
        </div>
    </div>

    <div class="row g-4">

        <div class="col-md-5">
            <div class="card shadow-sm">
                <div class="card-body">
                    <h4 class="mb-3">Informações do Pedido</h4>

                    <p><strong>ID:</strong> <span th:text="${pedido.id}"></span></p>
                    <p><strong>Data:</strong> <span th:text="${pedido.dataPedido}"></span></p>
                    <p><strong>Status:</strong> <span th:text="${pedido.status}"></span></p>
					<form th:action="@{'/admin/pedidos/' + ${pedido.id} + '/status'}" method="post" class="mt-3">
					    <label class="form-label"><strong>Alterar Status</strong></label>

					    <div class="d-flex gap-2">
					        <select name="status" class="form-select">
					            <option value="PENDENTE" th:selected="${pedido.status == 'PENDENTE'}">PENDENTE</option>
					            <option value="CONFIRMADO" th:selected="${pedido.status == 'CONFIRMADO'}">CONFIRMADO</option>
					            <option value="ENVIADO" th:selected="${pedido.status == 'ENVIADO'}">ENVIADO</option>
					            <option value="ENTREGUE" th:selected="${pedido.status == 'ENTREGUE'}">ENTREGUE</option>
					        </select>

					        <button type="submit" class="btn btn-primary">
					            Atualizar
					        </button>
					    </div>
					</form>
                    <p><strong>Total:</strong> 
                        <span class="text-success fw-bold" th:text="${pedido.valorTotal}"></span>
                    </p>
                </div>
            </div>

            <div class="card shadow-sm mt-4">
                <div class="card-body">
                    <h4 class="mb-3">Dados do Cliente</h4>

                    <p><strong>Nome:</strong> <span th:text="${pedido.nomeCliente}"></span></p>
                    <p><strong>Telefone:</strong> <span th:text="${pedido.telefoneCliente}"></span></p>
                    <p><strong>Cidade:</strong> <span th:text="${pedido.cidade}"></span></p>
                    <p><strong>Endereço:</strong> <span th:text="${pedido.endereco}"></span></p>
                    <p><strong>Observação:</strong> <span th:text="${pedido.observacao}"></span></p>
                </div>
            </div>
        </div>

        <div class="col-md-7">
            <div class="card shadow-sm">
                <div class="card-body">
                    <h4 class="mb-3">Itens do Pedido</h4>

                    <table class="table table-striped align-middle">
                        <thead class="table-dark">
                            <tr>
                                <th>Produto</th>
                                <th>Quantidade (kg)</th>
                                <th>Preço Unitário</th>
                                <th>Total Item</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="item : ${pedido.itens}">
                                <td th:text="${item.produto.nome}"></td>
                                <td th:text="${item.quantidade}"></td>
                                <td th:text="${item.precoUnitario}"></td>
                                <td th:text="${item.quantidade * item.precoUnitario}"></td>
                            </tr>
                        </tbody>
                    </table>

                    <div class="mt-3 text-end">
                        <h5>
                            Total do Pedido:
                            <span class="text-success fw-bold" th:text="${pedido.valorTotal}"></span>
                        </h5>
                    </div>
                </div>
            </div>
        </div>

    </div>

</div>

</body>
</html>
