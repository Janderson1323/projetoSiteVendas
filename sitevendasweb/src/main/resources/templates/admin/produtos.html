<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
<meta charset="UTF-8">
<title>Lista de Produtos</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container py-5">

<div class="d-flex justify-content-between align-items-center mb-4">

<h1 class="fw-bold">Lista de Produtos</h1>
<div th:if="${erro}" class="alert alert-danger">
	    <span th:text="${erro}"></span>
	</div>
	
<div>
<a href="/admin" class="btn btn-secondary me-2">Painel Admin</a>
<a href="/admin/produtos/novo" class="btn btn-primary">Novo Produto</a>
</div>

</div>

<div class="card shadow-sm">

<div class="card-body p-0">

<table class="table table-striped table-hover mb-0">

<thead class="table-dark">

<tr>
<th>ID</th>
<th>Nome</th>
<th>Descrição</th>
<th>Preço</th>
<th>Estoque</th>
<th>Ativo</th>
<th>Ações</th>
</tr>

</thead>

<tbody>

<tr th:each="produto : ${produtos}">

<td th:text="${produto.id}"></td>

<td th:text="${produto.nome}"></td>

<td th:text="${produto.descricao}"></td>

<td th:text="${produto.preco}"></td>

<td th:text="${produto.estoque}"></td>

<td>

<span th:if="${produto.ativo}" class="text-success fw-bold">
Sim
</span>

<span th:if="${!produto.ativo}" class="text-danger fw-bold">
Não
</span>

</td>

<td>

<a th:href="@{'/admin/produtos/editar/' + ${produto.id}}"
   class="btn btn-warning btn-sm me-1">
Editar
</a>

<span th:if="${produto.ativo}">
<a th:href="@{'/admin/produtos/desativar/' + ${produto.id}}"
   class="btn btn-danger btn-sm">
Desativar
</a>
</span>

<span th:if="${!produto.ativo}">
<a th:href="@{'/admin/produtos/ativar/' + ${produto.id}}"
   class="btn btn-success btn-sm">
Ativar
</a>
</span>


<form th:action="@{/admin/produtos/{id}/excluir(id=${produto.id})}"
      method="post"
      style="display:inline"
      onsubmit="return confirm('Deseja realmente excluir este produto?')">

    <button type="submit" class="btn btn-danger btn-sm">
        Excluir
    </button>

	
	
</form>



</td>

</tr>

</tbody>

</table>

</div>

</div>

</div>

</body>

</html>
