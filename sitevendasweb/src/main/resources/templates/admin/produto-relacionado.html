<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
<meta charset="UTF-8">
<title>Exclusão bloqueada</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container py-5">

<div class="card shadow">

<div class="card-body text-center">

<h3 class="text-danger mb-3">
Não foi possível excluir este produto
</h3>

<p>
O produto está vinculado a pedidos existentes e não pode ser removido.
</p>


<div class="alert alert-warning">

Pedidos que utilizam este produto:

<ul class="mb-0">

<li th:each="pedido : ${pedidos}">
	<li th:each="pedido : ${pedidos}">
	    Pedido #		<div class="alert alert-warning">

		Pedidos que utilizam este produto:

		<ul class="mb-0">

		<li th:each="item : ${pedidos}">
		    
		    Item ID:
		    <span th:text="${item.id}"></span>

		    -

		    Pedido:
		    <span th:text="${item.pedido != null ? item.pedido.id : 'SEM PEDIDO'}"></span>

		</li>

		</ul>

		</div>
	</li>
</li>

</ul>

</div>


<a th:href="@{/admin/produtos}" class="btn btn-primary">
Voltar para produtos
</a>


</div>

</div>

</div>

</body>
</html>
