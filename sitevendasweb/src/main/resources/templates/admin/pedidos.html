<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Lista de Pedidos</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container py-5">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="fw-bold">Lista de Pedidos</h1>

        <div class="d-flex gap-2">
            <a href="/admin" class="btn btn-secondary">Painel Admin</a>
        </div>
    </div>

    <div class="card shadow-sm border-0 mb-4">
        <div class="card-body">
            <form method="get" th:action="@{/admin/pedidos}" class="row g-3 align-items-end">
                <div class="col-md-4">
                    <label for="status" class="form-label fw-semibold">Filtrar por status</label>
                    <select name="status" id="status" class="form-select">
                        <option value="">Todos</option>
                        <option value="PENDENTE" th:selected="${statusSelecionado != null and statusSelecionado.name() == 'PENDENTE'}">PENDENTE</option>
                        <option value="ENVIADO" th:selected="${statusSelecionado != null and statusSelecionado.name() == 'ENVIADO'}">ENVIADO</option>
                        <option value="ENTREGUE" th:selected="${statusSelecionado != null and statusSelecionado.name() == 'ENTREGUE'}">ENTREGUE</option>
                        <option value="CANCELADO" th:selected="${statusSelecionado != null and statusSelecionado.name() == 'CANCELADO'}">CANCELADO</option>
                    </select>
                </div>

                <div class="col-md-auto">
                    <button type="submit" class="btn btn-primary">Filtrar</button>
                </div>

                <div class="col-md-auto">
                    <a href="/admin/pedidos" class="btn btn-outline-secondary">Limpar</a>
                </div>
            </form>
        </div>
    </div>

    <div th:if="${#lists.isEmpty(pedidos)}" class="alert alert-warning">
        Nenhum pedido encontrado.
    </div>

    <div th:if="${not #lists.isEmpty(pedidos)}" class="card shadow-sm border-0">
        <div class="card-body p-0">

            <table class="table table-striped table-hover mb-0 align-middle">
                <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>Cliente</th>
                        <th>Telefone</th>
                        <th>Cidade</th>
                        <th>Data do Pedido</th>
                        <th>Status</th>
                        <th>Valor Total</th>
                        <th>Ações</th>
                    </tr>
                </thead>

                <tbody>
                    <tr th:each="pedido : ${pedidos}">
                        <td>
                            <a th:href="@{/admin/pedidos/{id}(id=${pedido.id})}"
                               th:text="${pedido.id}"
                               class="fw-bold text-decoration-none">
                            </a>
                        </td>

                        <td th:text="${pedido.nomeCliente}"></td>
                        <td th:text="${pedido.telefoneCliente}"></td>
                        <td th:text="${pedido.cidade}"></td>
                        <td th:text="${pedido.dataPedido}"></td>

                        <td>
                            <span th:if="${pedido.status.name() == 'PENDENTE'}"
                                  class="badge bg-warning text-dark">
                                PENDENTE
                            </span>

                            <span th:if="${pedido.status.name() == 'ENVIADO'}"
                                  class="badge bg-info text-dark">
                                ENVIADO
                            </span>

                            <span th:if="${pedido.status.name() == 'ENTREGUE'}"
                                  class="badge bg-success">
                                ENTREGUE
                            </span>

                            <span th:if="${pedido.status.name() == 'CANCELADO'}"
                                  class="badge bg-danger">
                                CANCELADO
                            </span>
                        </td>

                        <td>
                            R$ <span th:text="${pedido.valorTotal}"></span>
                        </td>

                        <td>
                            <a th:href="@{/admin/pedidos/{id}(id=${pedido.id})}"
                               class="btn btn-sm btn-outline-primary">
                                Ver detalhe
                            </a>
                        </td>
                    </tr>
                </tbody>
            </table>

        </div>
    </div>

</div>

</body>
</html>
