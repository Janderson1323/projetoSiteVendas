<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Lista de Pedidos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container py-5">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="fw-bold">Lista de Pedidos</h1>

        <div>
            <a href="/admin" class="btn btn-secondary">Painel Admin</a>
        </div>
    </div>

    <div th:if="${#lists.isEmpty(pedidos)}" class="alert alert-warning">
        Nenhum pedido encontrado.
    </div>

    <div th:if="${not #lists.isEmpty(pedidos)}" class="card shadow-sm">
        <div class="card-body p-0">

            <table class="table table-striped table-hover mb-0 align-middle">
                <thead class="table-dark">
                    <tr>
                        <th>ID</th>
						
                        <th>Cliente</th>
                        <th>Telefone</th>
                        <th>Cidade</th>
                        <th>Data do Pedido</th>
                        <th>Status</th>
                        <th>Valor Total</th>
						
                    </tr>
                </thead>
				
				

                <tbody>
                    <tr th:each="pedido : ${pedidos}">
						<td>
						    <a th:href="@{/admin/pedidos/{id}(id=${pedido.id})}"
						       th:text="${pedido.id}">
						    </a>
						</td>                        <td th:text="${pedido.nomeCliente}"></td>
                        <td th:text="${pedido.telefoneCliente}"></td>
                        <td th:text="${pedido.cidade}"></td>
                        <td th:text="${pedido.dataPedido}"></td>
                        <td th:text="${pedido.status}"></td>
                        <td th:text="${pedido.valorTotal}"></td>
                    </tr>
                </tbody>
            </table>

        </div>
    </div>

</div>

</body>
</html>
