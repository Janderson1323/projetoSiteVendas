<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title th:text="${produto.nome}">Produto</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">


<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">

        <a class="navbar-brand fw-bold" href="/">
            GRANITINA
        </a>

        <a class="btn btn-outline-light" href="/catalogo">
            Voltar ao catálogo
        </a>

    </div>
</nav>


<section class="py-5">

<div class="container">

<div class="row g-5 align-items-center">


<div class="col-md-6">

<img th:src="${produto.imagemUrl}"
     class="img-fluid rounded shadow"
     style="width:100%; height:450px; object-fit:cover;">

</div>



<div class="col-md-6">


<h1 class="fw-bold" th:text="${produto.nome}">
Nome do produto
</h1>


<p class="text-muted fs-5"
   th:text="${produto.descricao}">
Descrição
</p>


<h3 class="text-success fw-bold">
R$ 
<span th:text="${#numbers.formatDecimal(produto.preco,1,'POINT',2,'COMMA')}">
0,00
</span>
</h3>


<p>
Estoque disponível:
<strong th:text="${produto.estoque + ' kg'}">
0 kg
</strong>
</p>



<form th:action="@{/carrinho/adicionar/{id}(id=${produto.id})}"
      method="post">


<label class="fw-semibold">
Quantidade (kg)
</label>


<input type="number"
       name="quantidade"
       value="1"
       min="1"
       class="form-control mb-3">


<button class="btn btn-primary btn-lg w-100">
Adicionar ao carrinho
</button>


</form>


<a th:href="'https://wa.me/5511954307383?text=Olá,%20tenho%20interesse%20no%20produto%20' 
            + ${produto.nome}"
   target="_blank"
   class="btn btn-success btn-lg w-100 mt-3">

    Comprar pelo WhatsApp

</a>


</div>


</div>

</div>

</section>


</body>
</html>
