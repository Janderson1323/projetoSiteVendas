<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Produto</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container py-5">

    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">

            <div class="card shadow-sm">
                <div class="card-header bg-primary text-white">
                    <h3 class="mb-0">Cadastrar / Editar Produto</h3>
                </div>

                <div class="card-body">
                    <form th:action="@{/admin/produtos/salvar}" th:object="${produto}" method="post">

                        <input type="hidden" th:field="*{id}">

                        <div class="mb-3">
                            <label class="form-label">Nome</label>
                            <input type="text" th:field="*{nome}" class="form-control">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Descrição</label>
                            <input type="text" th:field="*{descricao}" class="form-control">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Preço</label>
                            <input type="number" step="0.01" th:field="*{preco}" class="form-control">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Estoque</label>
                            <input type="number" th:field="*{estoque}" class="form-control">
                        </div>

                        <div class="form-check mb-4">
                            <input type="checkbox" th:field="*{ativo}" class="form-check-input">
                            <label class="form-check-label">Ativo</label>
                        </div>

                        <div class="d-flex justify-content-between">
                            <a href="/admin/produtos" class="btn btn-secondary">Voltar</a>
                            <button type="submit" class="btn btn-success">Salvar</button>
                        </div>

                    </form>
                </div>
            </div>

        </div>
    </div>

</div>

</body>
</html>
