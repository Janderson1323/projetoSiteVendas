<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
<meta charset="UTF-8">
<title>GRANITINA - Dolomita para Grafiato</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container py-4">

<!-- TOPO DA LOJA -->

<div class="d-flex justify-content-between align-items-center mb-4">

<div>
<h1 class="fw-bold text-primary mb-0">GRANITINA</h1>
<p class="text-muted mb-0">Dolomita para Grafiato</p>
</div>

<div>
<a href="https://wa.me/55SEUNUMEROAQUI"
   class="btn btn-success"
   target="_blank">
   WhatsApp
</a>
</div>

</div>

<hr>

<!-- TITULO DO CATÁLOGO -->

<div class="text-center mb-5">

<h2 class="fw-bold">Catálogo de Produtos</h2>

<p class="text-muted">
Venda direta com qualidade para acabamento e textura de parede.
</p>

</div>

<!-- LISTA DE PRODUTOS -->

<div class="row g-4">

<div class="col-md-6 col-lg-4" th:each="produto : ${produtos}">

<div class="card h-100 shadow-sm border-0 rounded-4 overflow-hidden">

<img th:src="${produto.imagemUrl}"
     alt="Imagem do produto"
     class="w-100"
     style="height: 260px; object-fit: cover;">

<div class="card-body d-flex flex-column">

<h4 class="card-title fw-bold mb-2" th:text="${produto.nome}"></h4>

<p class="card-text text-muted mb-3"
   th:text="${produto.descricao}">
</p>

<p class="mb-2 fs-5">

<strong>Preço:</strong>

<span th:text="${produto.preco}"></span>

</p>

<p class="mb-3">

<strong>Estoque:</strong>

<span th:text="${produto.estoque}"></span> kg

</p>

<!-- BOTÕES -->

<div class="mt-auto">

<a th:href="@{'https://wa.me/55SEUNUMEROAQUI?text=Olá,%20tenho%20interesse%20no%20produto:%20' + ${produto.nome}}"
   class="btn btn-success w-100 mb-2"
   target="_blank">
Comprar pelo WhatsApp
</a>

<form th:action="@{'/carrinho/adicionar/' + ${produto.id}}" method="post">

<div class="mb-2">

<label class="form-label">Quantidade (kg)</label>

<input type="number"
       name="quantidade"
       value="1"
       min="1"
       class="form-control">

</div>

<button type="submit" class="btn btn-primary w-100">

Adicionar ao Carrinho

</button>

</form>

</div>

</div>

</div>

</div>

</div>

</div>

</body>

</html>
