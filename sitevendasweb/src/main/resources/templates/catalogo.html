<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Catálogo de Produtos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container py-5">
    <div class="text-center mb-5">
        <h1 class="fw-bold">Dolomita para Grafiato</h1>
        <p class="text-muted">Venda direta com qualidade para acabamento e textura de parede.</p>
    </div>

    <div class="row g-4">
        <div class="col-md-6 col-lg-4" th:each="produto : ${produtos}">
            <div class="card h-100 shadow-sm">
                <div class="card-body">
                    <h4 class="card-title" th:text="${produto.nome}"></h4>
                    <p class="card-text" th:text="${produto.descricao}"></p>

                    <p class="mb-2">
                        <strong>Preço:</strong>
                        <span th:text="${produto.preco}"></span>
                    </p>

                    <p class="mb-3">
                        <strong>Estoque:</strong>
                        <span th:text="${produto.estoque}"></span> kg
                    </p>

                    <a th:href="@{'https://wa.me/55SEUNUMEROAQUI?text=Olá,%20tenho%20interesse%20no%20produto:%20' + ${produto.nome}}"
                       class="btn btn-success w-100"
                       target="_blank">
                        Comprar pelo WhatsApp
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
