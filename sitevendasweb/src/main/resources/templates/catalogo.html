<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
<meta charset="UTF-8">
<title>Catálogo - GRANITINA</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">GRANITINA</a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="menu">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link" href="/">Home</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link active" href="/catalogo">Catálogo</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/carrinho">Carrinho</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<section class="py-5 bg-light">
    <div class="container text-center">
        <h1 class="fw-bold text-primary">Catálogo de Produtos</h1>
        <p class="text-muted mb-0">Escolha os produtos e adicione ao carrinho.</p>
    </div>
</section>

<section class="py-5">
    <div class="container">
        <div class="row g-4">

            <div class="col-md-4" th:each="produto : ${produtos}">
                <div class="card h-100 shadow-sm border-0">

                    <img th:src="${produto.imagemUrl}"
                         class="card-img-top"
                         alt="Imagem do produto"
                         style="height: 250px; object-fit: cover;">

                    <div class="card-body d-flex flex-column">
                        <h5 class="card-title fw-bold" th:text="${produto.nome}">Nome</h5>

                        <p class="card-text text-muted" th:text="${produto.descricao}">
                            Descrição
                        </p>

                        <p class="mb-1">
                            <strong>Preço:</strong>
                            R$ <span th:text="${produto.preco}">0</span>
                        </p>

                        <p class="mb-3">
                            <strong>Estoque:</strong>
                            <span th:text="${produto.estoque}">0</span>
                        </p>

                        <form th:action="@{/carrinho/adicionar/{id}(id=${produto.id})}" method="post" class="mt-auto">
                            <div class="mb-3">
                                <label class="form-label">Quantidade (kg)</label>
                                <input type="number"
                                       name="quantidade"
                                       class="form-control"
                                       value="1"
                                       min="1"
                                       required>
                            </div>

                            <button type="submit" class="btn btn-primary w-100">
                                Adicionar ao carrinho
                            </button>
                        </form>

                    </div>
                </div>
            </div>

        </div>
    </div>
</section>

<footer class="py-4 border-top bg-light">
    <div class="container text-center">
        <h5 class="fw-bold text-primary mb-1">GRANITINA</h5>
        <p class="text-muted mb-2">Dolomita para Grafiato</p>
        <a href="https://wa.me/55SEUNUMEROAQUI" target="_blank" class="text-decoration-none">
            Atendimento via WhatsApp
        </a>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
